name: Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      PLAYWRIGHT_BASE_URL: http://localhost:3000
      PLAYWRIGHT_ADMIN_EMAIL: ${{ secrets.PLAYWRIGHT_ADMIN_EMAIL }}
      PLAYWRIGHT_ADMIN_PASSWORD: ${{ secrets.PLAYWRIGHT_ADMIN_PASSWORD }}
      PLAYWRIGHT_CONTRACTOR_EMAIL: ${{ secrets.PLAYWRIGHT_CONTRACTOR_EMAIL }}
      PLAYWRIGHT_CONTRACTOR_PASSWORD: ${{ secrets.PLAYWRIGHT_CONTRACTOR_PASSWORD }}
      PLAYWRIGHT_DEVELOPER_REPRESENTATIVE_EMAIL: ${{ secrets.PLAYWRIGHT_DEVELOPER_REPRESENTATIVE_EMAIL }}
      PLAYWRIGHT_DEVELOPER_REPRESENTATIVE_PASSWORD: ${{ secrets.PLAYWRIGHT_DEVELOPER_REPRESENTATIVE_PASSWORD }}
      PLAYWRIGHT_RESIDENT_EMAIL: ${{ secrets.PLAYWRIGHT_RESIDENT_EMAIL }}
      PLAYWRIGHT_RESIDENT_PASSWORD: ${{ secrets.PLAYWRIGHT_RESIDENT_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build app
        run: npm run build

      - name: Run Playwright tests
        run: npm run test:e2e

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
